            <a href="contacto.html">contacto →</a>
        </div>
    </nav>

    <header class="page-header">
        <div class="hero-tag">Disponível para propostas</div>
        <h1 class="hero-title">Vamos <span>Conversar</span></h1>
        <p class="hero-sub">Tens uma ideia ou um projeto em mente? Envia-me uma mensagem!</p>
    </header>

    <section class="contact-container">
        <div class="contact-sidebar">
            <div class="contact-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#9176FF" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </div>
                <div class="card-info">
                    <h4>E-mail</h4>
                    <p>salvic928@gmail.com</p>
                </div>
            </div>

            <div class="contact-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#9176FF" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
                </div>
                <div class="card-info">
                    <h4>LinkedIn</h4>
                    <p>linkedin.com/in/salvador</p>
                </div>
            </div>
        </div>

<div class="contact-form-wrapper">
    <form class="contact-form" action="https://formspree.io/f/meevvekb" method="POST">
        <div class="form-group">
            <label>Nome</label>
            <input type="text" name="name" placeholder="Teu nome" required>
        </div>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" name="email" placeholder="teu@email.com" required>
        </div>
        <div class="form-group">
            <label>Mensagem</label>
            <textarea name="message" rows="5" placeholder="Como posso ajudar?" required></textarea>
        </div>
        
        <input type="hidden" name="_subject" value="Novo contacto do Portfólio!">
        
        <button type="submit" class="btn-primary">Enviar Mensagem</button>
    </form>
</div>
    </section>

    <footer class="footer">
        <p>© 2026 Salvador<span>.dev</span></p>
        <p>A responder em menos de 24h</p>
    </footer>
